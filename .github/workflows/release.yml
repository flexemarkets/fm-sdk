name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          FILE_VERSION=$(cat VERSION)
          echo "Tag version: $TAG_VERSION"
          echo "File version: $FILE_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  publish-python:
    name: Publish Python to PyPI
    needs: validate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distribution
        run: python -m build sdks/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
          # Idempotent: a re-run after a partial release won't fail on a
          # version that already shipped.
          skip-existing: true

  publish-typescript:
    name: Publish TypeScript to npm
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing — no token needed
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest # OIDC publishing requires npm >= 11.5.1

      - name: Install dependencies
        run: npm install
        working-directory: sdks/typescript

      - name: Build
        run: npm run build
        working-directory: sdks/typescript

      - name: Publish to npm
        working-directory: sdks/typescript
        run: |
          # Trusted Publishing via OIDC (id-token) — no NODE_AUTH_TOKEN.
          # Idempotent: skip if this version is already on the registry.
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "npm: $NAME@$VERSION already published — skipping."
          else
            npm publish --access public
          fi

  publish-java:
    name: Publish Java to Maven Central
    needs: validate
    runs-on: ubuntu-latest
    environment: maven
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Idempotent: the central-publishing plugin uploads the whole
          # reactor (fm-spi + fm-sdk) as one atomic deployment, so the
          # presence of fm-sdk's POM on Central means this version already
          # shipped. Skip rather than fail on a duplicate-coordinate re-run.
          # (Central -> repo1 sync can lag ~15-30m, so a re-run within that
          # window may still attempt and be rejected by the Portal.)
          VERSION=$(cat VERSION)
          if curl -sfI "https://repo1.maven.org/maven2/com/flexemarkets/fm-sdk/$VERSION/fm-sdk-$VERSION.pom" >/dev/null; then
            echo "maven: com.flexemarkets:fm-sdk:$VERSION already on Central — skipping."
          else
            mvn -B deploy -P release --file sdks/java/pom.xml
          fi

  github-release:
    name: Create GitHub Release
    needs: [validate, publish-python, publish-typescript, publish-java]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Installation

            **Python:**
            ```bash
            pip install fm-sdk==${{ needs.validate.outputs.version }}
            ```

            **TypeScript/JavaScript:**
            ```bash
            npm install @flexemarkets/fm-sdk@${{ needs.validate.outputs.version }}
            ```

            **Java (Maven):**
            ```xml
            <dependency>
                <groupId>com.flexemarkets</groupId>
                <artifactId>fm-sdk</artifactId>
                <version>${{ needs.validate.outputs.version }}</version>
            </dependency>
            ```
